# ── Nginx — FIT-OCR reverse proxy ───────────────────────────────────────────
# Features: rate limiting, static file caching, gzip, security headers

worker_processes auto;
pid /tmp/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml application/wasm;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    # Per-IP: 30 req/s (burst 20) for OCR endpoints
    limit_req_zone $binary_remote_addr zone=ocr_limit:10m rate=30r/s;
    # Per-IP: 60 req/s for static assets
    limit_req_zone $binary_remote_addr zone=static_limit:10m rate=60r/s;

    # ── Upstream ─────────────────────────────────────────────────────────────
    upstream fitocr_backend {
        server fit-ocr:8001;
        keepalive 32;
    }

    # ── Main server ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 20m;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── Static files (uploads + output) — served directly by nginx ────────
        location /uploads/ {
            alias /app/data/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            limit_req zone=static_limit burst=30 nodelay;
        }

        location /output/ {
            alias /app/data/output/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            limit_req zone=static_limit burst=30 nodelay;
        }

        # ── Admin SPA ─────────────────────────────────────────────────────────
        location /admin/ {
            proxy_pass http://fitocr_backend;
            limit_req zone=static_limit burst=20 nodelay;
        }

        # ── OCR API + Admin API ───────────────────────────────────────────────
        location / {
            proxy_pass http://fitocr_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Timeouts (OCR can be slow)
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;

            limit_req zone=ocr_limit burst=20 nodelay;
        }
    }

    # ── HTTPS server (uncomment when certs are available) ─────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # ... same location blocks as above ...
    # }
}
